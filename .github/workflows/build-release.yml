name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            artifact_name: release-windows
            artifact_path: dist/KiCadPartsCollector.exe
          - label: macOS
            os: macos-latest
            artifact_name: release-macos
            artifact_path: dist/KiCadPartsCollector.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build app
        run: python -m PyInstaller --clean -y KiCadPartsCollector.spec

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/KiCadPartsCollector.app dist/KiCadPartsCollector.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-assets/KiCadPartsCollector.exe
            release-assets/KiCadPartsCollector.app.zip
